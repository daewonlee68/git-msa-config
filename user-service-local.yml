jdbc:
  url: jdbc:log4jdbc:postgresql://localhost:5432/tiremsdb?charSet=UTF-8&prepareThreshold=1
  username: postgres
  password: user1234

#  username: cenadm03
#  password: cenlotaws123!
  driverClassName: net.sf.log4jdbc.sql.jdbcapi.DriverSpy

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        ddl-auto: update
        format_sql: true
#        default_batch_fetch_size: 1000
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  cache:
    jcache:
      config: classpath:ehcache.xml

# config server actuator
management:
  endpoint:
    health:
      show-details: always 

info:
  app:
    name: User Service
    description: 로그인, 회원관리 및 관리자 기능을 제공

log4jdbc:
  spylogdelegator:
    name: net.sf.log4jdbc.log.slf4j.Slf4jSpyLogDelegator
  dump:
    sql:
      maxlinelength: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://admin:admin@tbiseo-discoveryserver-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    healthcheck:
      enabled: true  # UserServer에만, Gateway는 선택
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
