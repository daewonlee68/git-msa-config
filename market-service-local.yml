server:
  port: 7200

spring:
  application:
    name: market-service
  main:
    allow-bean-definition-overriding: true
  profiles:
    active:
      on-profile: local
  cloud:
    config:
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
      fail-fast: true
  security:
    user:
      name: admin
      password: admin
  redis:
    host: localhost
    port: 6379
    password: bitnami
    timeout: 500ms
    jedis:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 2
jdbc:
  url: jdbc:log4jdbc:postgresql://localhost:5432/tiremsdb?charSet=UTF-8&prepareThreshold=1
  username: postgres
  password: user1234
  driverClassName: net.sf.log4jdbc.sql.jdbcapi.DriverSpy

notify:
  server:
    base-url: http://localhost:7100
    send-path: /api/v1/alarm/notify/send

file:
  upload:
    path: ${FILE_UPLOAD_PATH:/app/uploads}
    max-size: ${FILE_UPLOAD_MAX_SIZE:2097152}   # 10485760 → 2097152 으로 변경 10M->2M

spring:
  servlet:
    multipart:
      max-file-size: 2MB      # 10MB → 2MB
      max-request-size: 2MB
      
management:
  endpoint:
    health:
      show-details: always

eureka:
  instance:
    prefer-ip-address: true
    hostname: tbiseo-discoveryserver-service
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:8761/eureka/
