server:
  port: 8080

spring:
  application:
    name: market-service
  main:
    allow-bean-definition-overriding: true
  profiles:
    active:
      on-profile: dev
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
  redis:
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 2
    port: 6379
    host: redis.backend.svc.cluster.local
    password: admin1234!
    timeout: 3000ms
  thymeleaf:
    check-template-location: false
  security:
    user:
      name: ${ACTUATOR_USER}  # Kubernetes Secret 필수
      password: ${ACTUATOR_PASSWORD}  # Kubernetes Secret 필수

jdbc:
  url: jdbc:log4jdbc:postgresql://postgresql-external.backend.svc.cluster.local:5432/tiremsdb?prepareThreshold=1
  username: postgres
  password: dev@tire1234!
  driverClassName: net.sf.log4jdbc.sql.jdbcapi.DriverSpy

management:
  endpoint:
    health:
      show-details: when-authorized  # 인증 필요

firebase:
  enabled: true
  project-id: tibiseo-eb3d2
  credentials:
    base64: 

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT:}
      bucket: ${S3_BUCKET:uploads}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
cdn:
  base-url: ${CDN_BASE_URL:}

spring:
  servlet:
    multipart:
      max-file-size: 2MB      # 10MB → 2MB
      max-request-size: 2MB

eureka:
  client:
    register-with-eureka: false  # 자신을 Eureka에 등록하지 않음
    fetch-registry: false
