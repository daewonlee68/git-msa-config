server:
  port: 6010

spring:
  application:
    name: app-tire-mg-service
  main:
    allow-bean-definition-overriding: true
  profiles:
    active:
      on-profile: local
  cloud:
    config:
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
      fail-fast: true
  security:
    user:
      name: admin
      password: admin
  redis:
    host: localhost
    port: 6379
    password: bitnami
    timeout: 500ms
    jedis:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 2

jdbc:
  url: jdbc:log4jdbc:postgresql://localhost:5432/tiremsdb?charSet=UTF-8&prepareThreshold=1
  username: postgres
  password: user1234
  driverClassName: net.sf.log4jdbc.sql.jdbcapi.DriverSpy

management:
  endpoint:
    health:
      show-details: always

eureka:
  instance:
    prefer-ip-address: true
    hostname: tbiseo-discoveryserver-service
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:8761/eureka/
