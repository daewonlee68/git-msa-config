server:
  port: 8080
  forward-headers-strategy: native

login_trans_host: https://tirehub.co.kr
redirect-app_uri: https://api.tirehub.co.kr/oauth2/callback/kakao

spring:
  application:
    name: user-service
  thymeleaf:
    check-template-location: false
  profiles:
    active:
      on-profile: dev
  cloud:
    discovery:
      enabled: false
  redis:
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 2
    port: 6379
    host: redis.backend.svc.cluster.local
    password: admin1234!
    timeout: 3000ms

#  cloud:
#    config:
#      enabled: true
#      bootstrap.enabled: true
  main:
    allow-bean-definition-overriding: true

  # oauth2 를 사용하기 위해서는 아래의 TODO 를 등록해야 함
  security:
    user:
      name: ${ACTUATOR_USER:admin}  # 환경변수 사용
      password: ${ACTUATOR_PASSWORD:admin}  #환경변수 사용
    oauth2:
      client:
        registration:
          kakao:
#            client-id: 6af5a456b722e07dc31337dd1820987e
            client-id: 9ae080208ac737b4ad647d21c6ab1f0e
#            client-secret: QnQPuzjuHKgK4WnWBj7utWZsXfSR52VX
            client-secret: anpI7SH7z1BFBLeG9Lm9TjIgRaQVgaBN
            redirect-uri: https://tirehub.co.kr/oauth2/callback/kakao
            client-authentication-method: POST
            authorization-grant-type: authorization_code
            scope: profile_nickname,account_email,phone_number
            client-name: Kakao
        provider:
          kakao:
            authorization_uri: https://kauth.kakao.com/oauth/authorize
            token_uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user_name_attribute: id

jdbc:
  url: jdbc:log4jdbc:postgresql://postgresql-external.backend.svc.cluster.local:5432/tiremsdb?prepareThreshold=1
  username: postgres
  password: dev@tire1234!
  driverClassName: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
#  driverClassName: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        ddl-auto: update
        format_sql: true
#        default_batch_fetch_size: 1000
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  cache:
    jcache:
      config: classpath:ehcache.xml

# config server actuator
management:
  endpoint:
    health:
      show-details: when-authorized  # 인증 필요

info:
  app:
    name: User Service
    description: 로그인, 회원관리 및 관리자 기능을 제공

log4jdbc:
  spylogdelegator:
    name: net.sf.log4jdbc.log.slf4j.Slf4jSpyLogDelegator
  dump:
    sql:
      maxlinelength: 0

logging:
  level:
    # OAuth2 로그인 과정을 아주 상세히 보여줍니다.
    org.springframework.security.oauth2: TRACE
    # 리다이렉트 관련 헤더 처리를 확인할 수 있습니다.
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
